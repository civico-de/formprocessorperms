# CI stack: CiviCRM Standalone via civikitchen. Booted, tested against, thrown
# away — no extra ports, no persistent volume.
services:
  app:
    image: ${IMAGE:-ghcr.io/jfilter/civikitchen:standalone}
    pull_policy: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      CIVICRM_AUTO_INSTALL: "1"
      CIVICRM_DB_HOST: db
      CIVICRM_DB_NAME: civicrm
      CIVICRM_DB_USER: civicrm
      CIVICRM_DB_PASSWORD: civicrm
      CIVIKITCHEN_SITE_URL: "http://localhost:8080"
      CIVIKITCHEN_EXTRA_EXTENSIONS: "action-provider,form-processor"
    volumes:
      - .:/var/www/html/ext/formprocessorperms

  db:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: civicrm
      MYSQL_USER: civicrm
      MYSQL_PASSWORD: civicrm
    volumes:
      # Headless tests need global grants for the <db>_test scratch database.
      - ./db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
